services:
  # Database Service (MySQL 8.0)
  db:
    image: mysql:8.0
    container_name: laravel_db_sp
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel_network

  # Redis Service (Untuk Cache, Session, dan Queue)
  redis:
    image: redis:alpine
    container_name: laravel_redis_sp
    restart: always
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    networks:
      - laravel_network

  # PHP 8.4 & Web Server Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app_sp
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./www:/var/www/html
    networks:
      - laravel_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Layanan n8n (Email Automation)
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: laravel_n8n_sp
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Jakarta
      - N8N_USER_MANAGEMENT_DISABLED=true
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - laravel_network

  # Laravel Scheduler Service (Pengecek Jadwal Otomatis)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_scheduler_sp
    restart: always
    depends_on:
      - db
      - redis
    volumes:
      - ./www:/var/www/html
    networks:
      - laravel_network
    command: php artisan schedule:work

networks:
  laravel_network:
    driver: bridge

volumes:
  db_data:
  n8n_data:
